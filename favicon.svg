<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle - KaarKalvi warm brown -->
  <circle cx="32" cy="32" r="32" fill="#2c1a0e"/>
  
  <!-- Car body - amber/gold accent -->
  <rect x="10" y="28" width="44" height="14" rx="4" fill="#c47820"/>
  
  <!-- Car roof/cabin -->
  <path d="M18 28 L22 18 L42 18 L46 28 Z" fill="#f4a100"/>
  
  <!-- Windshield -->
  <path d="M22 18 L24 22 L40 22 L42 18 Z" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Left wheel -->
  <circle cx="20" cy="42" r="7" fill="#1a0e06"/>
  <circle cx="20" cy="42" r="4" fill="#c47820"/>
  <circle cx="20" cy="42" r="2" fill="#f4a100"/>
  
  <!-- Right wheel -->
  <circle cx="44" cy="42" r="7" fill="#1a0e06"/>
  <circle cx="44" cy="42" r="4" fill="#c47820"/>
  <circle cx="44" cy="42" r="2" fill="#f4a100"/>
  
  <!-- Headlight left -->
  <rect x="10" y="30" width="5" height="3" rx="1" fill="#fff9c4"/>
  
  <!-- Taillight right -->
  <rect x="49" y="30" width="5" height="3" rx="1" fill="#ff4444"/>
  
  <!-- Window left -->
  <rect x="23" y="20" width="7" height="7" rx="1" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Window right -->
  <rect x="34" y="20" width="7" height="7" rx="1" fill="rgba(255,255,255,0.25)"/>
</svg>
